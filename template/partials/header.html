<a href="#main" class="gw-skip">Skip to content</a>
<header class="gw-header">
  <nav class="gw-container gw-nav" aria-label="Primary">
    <a href="/<%= it.slug %>/" class="gw-logo"><%= it.business_name %><span class="gw-dot">.</span></a>
    <div class="gw-nav-links" id="gw-nav-links">
      <a href="/<%= it.slug %>/services/"     <% if (it.page && it.page.startsWith('services')) { %>aria-current="page"<% } %>>Services</a>
      <a href="/<%= it.slug %>/equipment/"    <% if (it.page === 'equipment')     { %>aria-current="page"<% } %>>Equipment</a>
      <a href="/<%= it.slug %>/industries/"   <% if (it.page === 'industries')    { %>aria-current="page"<% } %>>Industries</a>
      <a href="/<%= it.slug %>/service-area/" <% if (it.page === 'service-area')  { %>aria-current="page"<% } %>>Service Area</a>
      <a href="/<%= it.slug %>/about/"        <% if (it.page === 'about')         { %>aria-current="page"<% } %>>About</a>
      <a href="/<%= it.slug %>/contact/"      <% if (it.page === 'contact')       { %>aria-current="page"<% } %>>Contact</a>
    </div>
    <a href="tel:<%= it.phone_e164 %>" class="gw-btn gw-btn-primary gw-nav-cta">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span><%= it.phone %></span>
    </a>
    <button class="gw-nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="gw-nav-links">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>
</header>
