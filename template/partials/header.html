<a href="#main" class="gw-skip">Skip to content</a>
<header class="gw-header">
  <nav class="gw-container gw-nav" aria-label="Primary">
    <a href="/<%= it.slug %>/" class="gw-logo" aria-label="<%= it.business_name %> — Home">
      <span class="gw-logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l4-4 4 3 5-6 5 6"/><path d="M3 21h18"/></svg>
      </span>
      <span class="gw-logo-text"><%= it.brand_name %><span class="gw-logo-dot">.</span></span>
    </a>

    <div class="gw-nav-links" id="gw-nav-links">
      <a href="/<%= it.slug %>/services/"      <% if (it.page && it.page.startsWith('services')) { %>aria-current="page"<% } %>>Services</a>
      <a href="/<%= it.slug %>/equipment/"     <% if (it.page === 'equipment')    { %>aria-current="page"<% } %>>Equipment</a>
      <a href="/<%= it.slug %>/industries/"    <% if (it.page === 'industries')   { %>aria-current="page"<% } %>>Industries</a>

      <details class="gw-nav-dropdown">
        <summary class="gw-nav-dropdown-trigger" aria-haspopup="menu">
          More
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="gw-nav-dropdown-menu" role="menu">
          <a role="menuitem" href="/<%= it.slug %>/about/"        <% if (it.page === 'about')        { %>aria-current="page"<% } %>>About</a>
          <a role="menuitem" href="/<%= it.slug %>/service-area/" <% if (it.page === 'service-area') { %>aria-current="page"<% } %>>Service Area</a>
        </div>
      </details>

      <a href="/<%= it.slug %>/contact/" class="gw-nav-contact" <% if (it.page === 'contact') { %>aria-current="page"<% } %>>Contact</a>
    </div>

    <div class="gw-nav-actions">
      <a href="tel:<%= it.phone_e164 %>" class="gw-btn gw-btn-primary gw-nav-cta" aria-label="Call <%= it.phone %>">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span><%= it.phone %></span>
      </a>

      <button class="gw-nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="gw-nav-links">
        <span class="gw-nav-toggle-bars" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>
  </nav>
</header>
